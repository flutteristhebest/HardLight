- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckCollarBase
  abstract: true
  components:
  - type: Clothing
    # HardLight start
    slots: [ neck, accessory, accessoryalt ]
    clothingVisuals:
      neck:
      - state: equipped-NECK
      neck-quadborg:
      - state: equipped-NECK-quadborg
    # HardLight end
  - type: LeashAnchor
    offset: 0, 0.22
    kind: Clothing
  - type: Tag # HardLight
    tags:
    - BorgWearable

- type: entity
  parent: ClothingNeckCollarBase
  id: ClothingNeckCollarBlue
  name: blue collar
  description: A cute blue collar.
  components:
  - type: Sprite
    sprite: Floof/Clothing/Neck/collar_blue.rsi
  - type: Clothing
    sprite: Floof/Clothing/Neck/collar_blue.rsi
    clothingVisuals: # HardLight
      neck-quadborg:
      - sprite: _HL/Clothing/Neck/QuadCollars/collar_blue_quad.rsi
        state: equipped-NECK-quadborg

