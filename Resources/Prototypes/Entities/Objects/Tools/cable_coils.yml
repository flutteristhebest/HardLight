# If you're looking at the rsi for this file, you'll probably be confused why
# I didn't just use an alpha for most of this stuff. Well icons don't have the
# ability to have applied colors yet in GUIs. And also inhands... -Swept

- type: entity
  id: CableStack
  abstract: true
  parent: BaseItem
  name: cable stack
  suffix: Full
  components:
  - type: Tag
    tags:
    - CableCoil
  - type: Stack
    stackType: Cable
  - type: Sprite
    sprite: Objects/Tools/cable-coils.rsi
  - type: Item
    sprite: Objects/Tools/cable-coils.rsi
    size: Small
    storedRotation: -90
  - type: CablePlacer
  - type: Clickable
  - type: StaticPrice
    price: 0
  - type: StackPrice
    price: 2.25
  - type: PhysicalComposition
    materialComposition:
      Steel: 15
  # FIXME: Used isnt actually implemented so its still unlimited.
  # Uncomment this when its implemented, and make sure it handles StackComponent right
  #- type: Hemostat # Shitmed
  #  speed: 0.15
  #- type: SurgeryTool # Shitmed
  #  used: true
  #  startSound:
  #    path: /Audio/_Shitmed/Medical/Surgery/retractor1.ogg
  #  endSound:
  #    path: /Audio/_Shitmed/Medical/Surgery/hemostat1.ogg
  - type: GuideHelp
    guides:
    - VoltageNetworks
    - Power

- type: entity
  id: CableHVStack
  parent: CableStack
  name: HV cable coil
  suffix: Full
  description: HV cables for connecting engines to heavy duty machinery, SMESes, and substations.
  components:
  - type: Stack
    stackType: CableHV
    baseLayer: base
    layerStates:
    - coilhv-10
    - coilhv-20
    - coilhv-30
  - type: Sprite
    state: coilhv-30
    layers:
    - state: coilhv-30
      map: ["base"]
  - type: Item
    heldPrefix: coilhv
  - type: CablePlacer
    cablePrototypeID: CableHV
    blockingWireType: HighVoltage
  - type: Appearance
  - type: Extractable
    grindableSolutionName: hvcable
  - type: SolutionContainerManager
    solutions:
      hvcable:
        reagents:
        - ReagentId: Iron
          Quantity: 3
        - ReagentId: Copper
          Quantity: 2
        - ReagentId: Carbon #steel-reinforced
          Quantity: 1
  # EE Change Start
  - type: Healing
    delay: 1
    damageContainers:
    - Silicon
    damage:
      types: # HardLight: Made HV heal a little more than MV at an even slower rate.
        Heat: -5.44
        Shock: -5.44
        Cold: -5.44
  # EE Change End
  # FH Start - Protogen Healing
  - type: ConditionalHealing
    healingDefinitions:
      - allowedTags: [Protogen, ProtoArachnid, ProtoAvali, ProtoDawi, ProtoDionae, ProtoFeline, ProtoHumie, ProtoMoth, ProtoReptile, ProtoResomi, ProtoSlimePerson, ProtoThaven, ProtoVox, ProtoVulp, ProtoKin]
        healing:
          damageContainers:
            - Biological
          delay: 2
          damage:
            types:
              Heat: -10
              Cold: -10
              Shock: -10
              Caustic: -10
          healingBeginSound:
            path: "/Audio/Items/Medical/ointment_begin.ogg"
            params:
              volume: 1.0
              variation: 0.125
          healingEndSound:
            path: "/Audio/Items/Medical/ointment_end.ogg"
            params:
              volume: 1.0
              variation: 0.125
  # FH End - Protogen Healing

- type: entity
  parent: CableHVStack
  id: CableHVStack10
  suffix: 10
  components:
  - type: Sprite
    state: coilhv-10
  - type: Stack
    count: 10

- type: entity
