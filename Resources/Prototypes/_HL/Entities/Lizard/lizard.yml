- type: entity
  id: whiteRainLizard
  parent: HL_LizardHead
  name: White Rain Lizard
  components:
  - type: NpcFactionMember
    factions:
    - Lizard
  - type: Sprite
    drawdepth: Mobs
    sprite: _HL/Lizard/lizard.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: lizardheadclosed
      scale: 0.9, 0.9
      color: "#fcfcfc"
      shader: unshaded
  - type: SegmentedEntity
    numberOfSegments: 3
    initialRadius: 0.6
    staticOffset: 0.7
    staticScale: 0.6
    initialSegmentId: greenRainLizardInitialSegment
    segmentId: greenRainLizardSegment
    useTaperSystem: true
    taperOffset: 3
    texturePath: /Textures/_HL/Lizard/lizard.rsi/segment.png
    shaderId: unshaded
  - type: Stealth
    enabledOnDeath: false
    maxVisibility: 1.2
  - type: StealthOnMove
    passiveVisibilityRate: -0.25
    movementVisibilityRate: 0.25

