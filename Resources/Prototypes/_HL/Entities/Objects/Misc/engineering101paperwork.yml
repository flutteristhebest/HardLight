- type: entity
  id: PaperworkEngiElectrical101
  name: Engineering 101 - Eletrical Networks
  description: Contains all the info one might need about wiring and their components.
  parent: Paper
  components:
  - type: Paper
    content: |2
      [color=#f39f27]░░▄▀░░ [head=2][/head][/color] [bold]Hardlight Sector: Engineering 101[/bold]       [bold]Form: [/bold][color=#f39f27]EN-1[/color]
      [color=#f39f27]░▄█▄▄▀ [head=3][/head][/color] [color=#AAAAAA][italic]Brought to you by Colonial Command[/color][/italic]
      [color=#f39f27]██▀░░░ [head=3][/head][/color] [color=#AAAAAA][italic]Written By: [bold]Colonial Engineer, CYN-182[/bold][/color][/italic]
      [color=#383838]▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄[/color]
      [color=#f39f27]▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀[/color]
                           [head=1][color=#f39f27]Electrical[/color] Networks[/head]

      [color=#AAAAAA][italic]The following is intended to teach you the basics of setting up wiring. Be it with LV, MV, or HV wiring.[/color][/italic]
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Low Voltage[/head]
      Low Voltage Wires, otherwise known as "LV" Wires. 

      The green wiring that flows through the station, commonly powering Gas Pipes, Machines, Lathes, Lights, Ect...

      They pull power from "APCs." The machines are commonly seen dotted around the station on walls. These can be toggled on and off without the need to alter wires.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Medium Voltage[/head]
      Medium Voltage Wires, otherwise known as "MV" Wires. 

      These are yellow wirings that commonly connecting "Substations" to APCs.

      These are the wires that are the in-between HV and LV wires as they step-down HV connections to be useable for APCs via the Substations.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• High Voltage[/head]
      High Voltage Wires, otherwise known as "HV" Wires.

      These connect the various things that produce power to SMES's and/or Substations to feed power to the stations APC's. 

      Most are commonly wires that bridge the gap to bring power from things like; Solars, Radiation Collector's, TEGs, AME's, Ect.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• APCs[/head]
      Connects a MV Wire to step-down to a LV to bring power to the stations electronics and machines. Can be toggled on and off at their specific board to turn power on and off for anything connected.

      [head=2]• Substations[/head]
      Connects a HV wire to step-down to a MV. Bringing power to a APC Network. Substations are Commonly situated in a way to power a whole department or region's APC Network.

      [head=2]• SMES's[/head]
      Connects a HV Wire to charge and discharge as required. Used to store excess power incase things go badly and allow time to fix the problem before the station looses all power.

      These require specifically a "Cable Terminal" to pull any produced power into themselves from HV Wires. Be mindful, as they will pull from MV and LV Wires as-well if they happen to be underneath. Also note; Cable Terminals separate the HV Network and avoids them connecting to cause the problem below.

      Under no circumstances are you to connect the Output HV Wires from the SMES's to the Input Wires. This will cause a charge-loop which can rapidly cause a blackout if power production begins to fall short of the stations power use.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [color=#AAAAAA][italic][bold]Thank You, [/bold]for reading this document. As; 
      "Ignorance is only harmful if you do not seek to learn."[/color][/italic]

