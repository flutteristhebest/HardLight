# Kissing
- type: Interaction
  id: Kiss
  parent: [BaseGlobal, BaseMouth]
  priority: -1
  delay: 0.4
  range: {max: 1}
  requiresUnblocked: false
  exemptFromInteractionBlocker: true
  hideByRequirement: true
  requirement:
    !type:ComplexRequirement
    requirements:
    - !type:SlotObstructionRequirement
      slot: mask
      checkUser: true
    - !type:EntityWhitelistRequirement
      whitelist:
        components: [MobState] # Don't go around kissing inanimate objects.
  action:
    !type:NoOpAction
#    effect: BeingKissed | Moods not implemented
  effectSuccess:
    popup: Obvious
    sound: {path: /Audio/Floof/Lewd/kiss.ogg}
  effectFailure: null

# Licking?
- type: Interaction
  id: Lick
  parent: [BaseGlobal, BaseMouth]
  priority: -2
  delay: 0.7
  range: {max: 1}
  requiresUnblocked: false
  exemptFromInteractionBlocker: true
  hideByRequirement: true
  requirement:
    !type:ComplexRequirement
    requirements:
    - !type:SlotObstructionRequirement
      slot: mask
      checkUser: true
    - !type:EntityWhitelistRequirement
      whitelist:
        components: [MobState, Anomaly, Edible] # TODO check if can be metabolized
        tags: [Window] # yes.
  action:
    !type:NoOpAction
#    effect: BeingLicked | Moods not implemented
  effectSuccess:
    popup: Obvious
    sound: {path: /Audio/Floof/Lewd/lick.ogg}
  effectFailure: null
