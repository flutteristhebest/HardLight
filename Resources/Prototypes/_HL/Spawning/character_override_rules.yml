## Component example
- type: spawnCharacterOverrideRule
  id: abyssbloodverzi
  match: Verzical The Watcher
  checkProfileName: true
  checkEntityName: true
  logins:
  - VexonOrkali
  components:
  - type: DamagedByFlashing
    flashDamage:
        types:
           Heat: 120
  - type: Bloodstream
    bloodReagent: AbyssalBlood
    bloodMaxVolume: 650
    bloodlossDamage:
      types:
        Bloodloss: 0.5
    bloodlossHealDamage:
      types:
        Bloodloss: -1
