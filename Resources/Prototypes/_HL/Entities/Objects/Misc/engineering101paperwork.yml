    content: |2
      [color=#f39f27]░░▄▀░░ [/color] [bold]Hardlight Sector: Engineering 101[/bold]       [bold]Form: [/bold][color=#f39f27]SE-1[/color]
      [color=#f39f27]░▄█▄▄▀ [/color] [color=#AAAAAA][italic]Brought to you by Colonial Command[/color][/italic]
      [color=#f39f27]██▀░░░ [/color] [color=#AAAAAA][italic]Written By: [bold]Colonial Engineer, CYN-182[/bold][/color][/italic]
      [color=#383838]▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄[/color]
      [color=#f39f27]▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀[/color]
                           [head=1][color=#f39f27]Singularity[/color] Engine[/head]

      [color=#AAAAAA][italic]The following is intended to teach you how to safely operate a Singularity Engine.[/color][/italic]
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Singularity Engine[/head]
      A Singularity Engine is a 9x9 space with 4 "Containment Field Generator's" at each corner, while being powered via "Emitters" firing a energy laser at them.

      In the center rests the Singularity Generator, which outputs radiation once turned into a Singularity by firing a "Particle Accelerator" or PA at it. This radiation is collected and produces power via "Radiation Collector's."

      It is recommended to to refuel the Radiation Collector's every 20 minutes to ensure peak power production.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Extra Info[/head]
      Radiation Collector's require gaseous plasma to function, however the tank its held in doesn't matter. Plasma Tank, Air Tank. It will take them all the same. With the amount of plasma in the tank draining each second being based off the amount of radiation its exposed too, and subsequently the amount of power it produces.

      The Emitter's require a MV Connection to function to charge the Containment fields. Be careful to not be hit by one of their energy beams, as they can cause painful burns.

      The Particle Accelerator should be at maximum set to a power output of 2, as most Singularity Engine's lack the space for a larger Singularity. As-well as the beams of energy the PA produces are harmless by themselves, and can pass through objects.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Singuloose Event[/head]
      A "Singuloose" is whenever the Singularity inside a Singularity Engine breaks out, or is released from its containment and begins to consume the station.

      The only way to stop a Singuloose is to fire on it with "Portable Particle Decelerator's" or PPD's. Which carry enough internal charge for 20 shots. After which requires recharging inside a recharger. These can be produced in a Protolathe or Engineering Techfab.

      Do note, PPD's much like the PA can fire through objects. So use it to your advantage if the singuloose is known to be beyond the object your firing through.

      You WILL be irradiated by it, if attempting to destabilize it enough using PPD's! Work with Medical to ensure your health if the radiation begins to become debilitating.

      Wearing Magboots will be a life-saver. As a Singuloose normally reaches critical mass, so has a very strong gravitational pull. If Magboots are not available, attempt to keep your distance from it or ask Science to produce more using their Protolathe.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [color=#AAAAAA][italic][bold]Thank You, [/bold]for reading this document. As; 
      "Ignorance is only harmful if you do not seek to learn."[/color][/italic]

