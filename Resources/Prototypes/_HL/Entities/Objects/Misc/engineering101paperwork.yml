      [color=#383838]▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄[/color]
      [color=#f39f27]▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀[/color]
                      [head=1][color=#f39f27]Supermatter[/color] Crystal[/head]

      [color=#AAAAAA][italic]The following is intended to teach you how to make and run SM.[/color][/italic]
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Supermatter Crystal[/head]
      A power source that generates radiation which is collected by radiation collector's to produce power. Which can be increased via firing a emitter at it.

      Poor management of the gasses inside its chamber or temperature results in a "Delamination" which takes different reactions but all ultimately result in the destruction of a large area around the Supermatter and threatens the entire station.

      When active, which is upon a emitter firing on it or a object touching it, begins to output Oxygen and Plasma. Which scales higher based off its radiation intensity.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Supermatter Interactions[/head]
      The Crystal actively intakes the gas within its chamber, altering its output and reaction based off what gasses are inside.

      Normally that would be Nitrogen, which actively lowers its output on a percentile basis. Making it require more to scale its power output higher. With it being a incredibly safe and stable gas for use with the Supermatter.

      If one was to wish to raise the power output however in a safe manner. Carbon Dioxide is a go-to so long as its done in moderation and kept cool to avoid breaking down into Oxygen, otherwise it risks causing a "Charged Delamination." Which results in rapid formations of electrical anomaly's and eventually a Tesla Ball. 
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Cold Loop[/head]
      To keep the Supermatter's gasses cold and avoid a Delamination, a Cold Loop is required.

      It functions much similarly to a TEGs Cold Loop. Either using radiator's in space to cool down gasses, freezers, or both.

      However, unlike TEGs, the Cold Loop must also remove unwanted gasses, like Plasma or Oxygen to avoid a burn within the chamber or runaway reaction.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [color=#AAAAAA][italic][bold]Thank You, [/bold]for reading this document. As; 
      "Ignorance is only harmful if you do not seek to learn."[/color][/italic]

