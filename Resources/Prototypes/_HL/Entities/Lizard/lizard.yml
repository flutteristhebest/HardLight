- type: entity
  id: greenRainLizard
  parent: HL_LizardHead
  name: Green Rain Lizard
  components:
  - type: NpcFactionMember
    factions:
    - Lizard
  - type: Sprite
    drawdepth: Mobs
    sprite: _HL/Lizard/lizard.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: lizardheadclosed
      scale: 0.8, 0.8
      color: "#14fc00"
      shader: unshaded
  - type: SegmentedEntity
    numberOfSegments: 3
    initialRadius: 0.5
    staticOffset: 0.5
    staticScale: 0.5
    initialSegmentId: greenRainLizardInitialSegment
    segmentId: greenRainLizardSegment
    useTaperSystem: true
    taperOffset: 3
    texturePath: /Textures/_HL/Lizard/lizard.rsi/greensegment.png
    shaderId: unshaded

