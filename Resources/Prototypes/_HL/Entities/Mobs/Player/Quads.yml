- type: entity
  id: BorgChassisQuadMoss
  parent: BorgChassisQuadserv
  components:
  - type: Sprite
    sprite: _HL/Mobs/Player/borgs/quads.rsi
    scale: 0.7, 0.7
    layers:
    - state: quadspritemoss
      map: ["movement"]
    - state: quadspriteservl
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: quadspriteservr
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: quadspritemoss_moving
    noMovementLayers:
      movement:
        state: quadspritemoss
  # HardLight start: Added encryption key slots in addition to intrinsic radio channels.
  - type: EncryptionKeyHolder
    keySlots: 10
    preserveExistingChannels: true
    intrinsicChannels:
    - Binary
    - Science
    - Service
    - Common
  - type: IntrinsicRadioTransmitter
    intrinsicChannels:
    - Binary
    - Science
    - Service
    - Common
  - type: ActiveRadio
    intrinsicChannels:
    - Binary
    - Science
    - Service
    - Common
  # HardLight end
  - type: SpriteStateToggle
    spriteLayer: movement
    stateOff: quadspritemoss
    stateOn: quadspritemossballz
    movementStateOff: quadspritemoss_moving
    movementStateOn: quadspritemoss_movingballz

- type: entity
  id: Engiservquad
  parent: BorgChassisQuad
  components:
  - type: Sprite
    sprite: _HL/Mobs/Player/borgs/quads.rsi
    scale: 0.7, 0.7
    layers:
    - state: engieservborg
      map: ["movement"]
    - state: engieborgl
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: engieborgr
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: engieservborg_moving
    noMovementLayers:
      movement:
        state: engieservborg
  - type: BorgChassis
    maxModules: 5
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
      - XenoborgModuleGeneric
      - BorgModuleSecurity
      - BorgModuleSyndicate
      - BorgModuleSyndicateAssault
      - BorgModuleMedical
      - BorgModuleEngineering
      - BorgModuleScience
      - BorgModuleService
      - BorgModuleCargo
    hasMindState: engieborgl
    noMindState: engieborgr
  - type: BorgTransponder
    sprite:
      sprite: _HL/Mobs/Player/borgs/quads.rsi
      state: engieservborg
    name: Verzical
  - type: SpriteStateToggle
    spriteLayer: movement
    stateOff: engieservborg
    stateOn: engieservborgballz
    movementStateOff: engieservborg_moving
    movementStateOn: engieservborg_movingballz
    
