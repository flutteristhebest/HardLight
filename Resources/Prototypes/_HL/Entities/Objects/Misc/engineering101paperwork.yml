      [color=#f39f27]░░▄▀░░ [/color] [bold]Hardlight Sector: Engineering 101[/bold]       [bold]Form: [/bold][color=#f39f27]TG-1[/color]
      [color=#f39f27]░▄█▄▄▀ [/color] [color=#AAAAAA][italic]Brought to you by Colonial Command[/color][/italic]
      [color=#f39f27]██▀░░░ [/color] [color=#AAAAAA][italic]Written By: [bold]Colonial Engineer, CYN-182[/bold][/color][/italic]
      [color=#383838]▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄[/color]
      [color=#f39f27]▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀[/color]
        [head=1][color=#f39f27]Thermo-Electric[/color] Generator[/head]

      [color=#AAAAAA][italic]The following is intended to teach you how to make and run a TEG.[/color][/italic]
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Thermo-Electric Generator[/head]
      A power producer that generates electricity based off a temperature difference. The higher the difference between the two sides, the more power that is produced.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Cold Loop[/head]
      A Nitrogen filled gas loop that feeds into one side of the TEG via a Circulator.

      Commonly is cooled via space using radiator's, however for more compact setups it can be cooled via Freezers. Doing both is also a viable way for higher efficiency.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Hot Loop[/head]
      A Plasma filled gas loop that feeds into one side of the TEG via a Circulator.

      Commonly is heated via the burning of Plasma and Oxygen in a "Burn Chamber" at a 3% Plasma to 97% Oxygen mixture. It is recommended to fill said Burn Chamber to the maximum it can be with a injector, which is 9000kPa, before burning the mixture for the most efficient burn.

      The Plasma in the Hot Loop's pipes is pushed through the room, and heated via radiator's. Which is moved out and into the TEG.

      This loop always will become overfilled from heating up, so it is a must-have to setup a off-shoot with a Inlet Pressure Regulator set to 4400kPa that vents to space to avoid a clog. 

      This off-shoot must be before the radiator's or before the pump that pushes gas into the radiator's. Or it will fail to work properly.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Hellfire Freezers[/head]
      A more complex and power hungry, though even more efficient, way to cool a TEG's cold loop.

      It uses a sealed room of Hellfire Freezers to cool the gas that goes through the pipes, then is put into the room directly via a passive vent or injector. Hellfire Freezers cool the gas due to their flaw. Then the gas is then taken back into the loop via a passive vent or scrubber to be pushed into the TEG.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [color=#AAAAAA][italic][bold]Thank You, [/bold]for reading this document. As; 
      "Ignorance is only harmful if you do not seek to learn."[/color][/italic]

