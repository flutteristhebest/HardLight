- type: trait
  id: Leadfooted
  name: Lead-footed
  description: somehow able to stay standing during the rigors of FTL 
  category: Physical
  cost: 3
  components:
  - type: FTLKnockdownImmune

- type: trait
  id: Innoculated
  name: Innoculated
  description: made Zombie immune due to regular ambuzol plus innoculations. 
  category: Physical
  cost: 5
  components:
  - type: ZombieImmune

- type: trait
  id: insulated
  name: Insulated
  description: through natural or artificial means you're naturally insulated against electricity 
  category: Physical
  cost: 10
  speciesBlacklist:
  - IPC
  mutuallyExclusiveTraits:
  - fireproof
  - radproof
  - snakeeater
  - cryoresistant
  components:
  - type: Insulated
  
- type: trait
  id: fireproof
  name: fireproof
  description: through natural or artificial means you're naturally insulated against fire
  category: Physical
  cost: 10
  speciesBlacklist:
  - IPC
  mutuallyExclusiveTraits:
  - insulated
  - radproof
  - snakeeater
  - cryoresistant
  components:
  - type: Flammable
    fireSpread: false
    damage:
      types:
        Heat: 0.01
  - type: Temperature
    heatDamageThreshold: 20000
  - type: FireProtection
    reduction: 1
 
- type: trait
  id: radproof
  name: radproof
  description: through natural or artificial means you're naturally insulated against radiation
  category: Physical
  cost: 10
  speciesBlacklist:
  - IPC
  mutuallyExclusiveTraits:
  - insulated
  - fireproof
  - snakeeater
  - cryoresistant
  components:
  - type: Armor
    modifiers:
      coefficients:
        Radiation: 0.01
      
- type: trait
  id: snakeeater
  name: snakeeater
  description: through natural or artificial means you're naturally immune to toxins
  category: Physical
  cost: 10
  speciesBlacklist:
  - IPC
  mutuallyExclusiveTraits:
  - insulated
  - fireproof
  - radproof
  - cryoresistant
  components:
  - type: Armor
    modifiers:
      coefficients:
        Poison: 0.01
  
- type: trait
  id: cryoresistant
  name: cryo resistant
  description: through natural or artificial means you're naturally insulated against the cold 
  category: Physical
  cost: 8
  speciesBlacklist:
  - IPC
  mutuallyExclusiveTraits:
  - fireproof
  - insulated
  - snakeeater
  - radproof
  components:
  - type: Temperature
    coldDamageThreshold: -250

- type: trait
  id: NaturalRegen
  name: natural regeneration
  description: naturally capable of healing from lesser injuries. 
  category: Physical
  cost: 6
  mutuallyExclusiveTraits:
  - PlateletFactories
  - Hemophilia
  - UnnaturalRegen
  components:
  - type: PassiveDamage
    allowedStates:
    - Alive
    damageCap: 500
    damage:
      groups:
        Brute: -0.3
        Burn: -0.3
        Airloss: -1
        
- type: trait
  id: UnnaturalRegen
  name: unnatural regeneration
  description: capable of healing from most injuries with unnatural efficiency. 
  category: Physical
  cost: 8
  mutuallyExclusiveTraits:
  - PlateletFactories
  - NaturalRegen
  - Hemophilia
  components:
  - type: PassiveDamage
    allowedStates:
    - Alive
    - Critical
    damageCap: 500
    damage:
      groups:
        Brute: -0.3
        Burn: -0.3
        Airloss: -1
     

