- type: entity
  parent: [ BaseXenoborgChassis, BaseXenoborgTransponder ]
  id: XenoQuadfeathered
  name: S'nai
  suffix: with brain
  description: A former Xenoborg with heavy chassis modifications, giving it a more draconic look. "Xi" is scratched onto one of its shoulder panels.
  components:
  - type: Construction
    node: start
  - type: BorgTransponder
    name: Quad xenoborg
    sprite:
      sprite: _HL/Mobs/Player/borgs/quads.rsi
      state: XenoQuadfeathered
  - type: BorgChassis
    maxModules: 10
    hasMindState: XenoQuadfeatheredglow
    noMindState: XenoQuad_e_r
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
      - XenoborgModuleGeneric
      - BorgModuleSecurity
      - BorgModuleSyndicate
      - BorgModuleSyndicateAssault
      - BorgModuleMedical
      - BorgModuleEngineering
      - BorgModuleScience
  - type: ContainerFill
    containers:
      borg_brain:
      - MMIFilled
      borg_module:
      - XenoborgModuleBasic
      - BorgModuleKill
      - BorgModuleTool
      - BorgModuleAdvancedSurgery
  - type: ShowHealthBars
    damageContainers:
    - Inorganic
    - Silicon
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHigh
  - type: Sprite
    sprite: _HL/Mobs/Player/borgs/quads.rsi
    scale: 0.7, 0.7
    layers:
    - state: XenoQuadfeathered
      map: ["movement"]
    - state: XenoQuadfeatheredglow
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: XenoQuadfeatheredglow
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteStateToggle
    spriteLayer: movement
    stateOff: XenoQuadfeathered
    stateOn: XenoQuadfeatheredballz
    movementStateOff: XenoQuadfeathered_moving
    movementStateOn: XenoQuadfeathered_movingballz
  - type: SpriteMovement
    movementLayers:
      movement:
        state: XenoQuadfeathered_moving
    noMovementLayers:
      movement:
        state: XenoQuadfeathered
