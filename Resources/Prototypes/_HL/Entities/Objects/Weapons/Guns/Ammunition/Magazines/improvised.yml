- type: entity
  id: Magazine556/762x39Improvised
  name: improvised rifle magazine (556/762x39)
  parent: [ BaseC1Contraband, RecyclableItemSteelTiny, BaseMagazineLightRifle ]
  components:
  - type: Construction
    graph: Improvised556/762x39MagazineGraph
    node: shell
  - type: Tag
    tags:
      - ForgedRifleMagazine
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge762x39mmFMJ
        - Cartridge556x45mmFMJ
        - Cartridge556x45mmImprovised
    proto: Cartridge556x45mmFMJ
    capacity: 20
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Ammunition/Magazine/Rifle/rifle30_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-7
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 8
    zeroVisible: false

