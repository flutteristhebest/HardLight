- type: trait
  id: Innoculated
  name: Innoculated
  description: made Zombie immune due to regular ambuzol plus innoculations.
  category: Physical
  cost: 5
  components:
  - type: ZombieImmune

- type: trait
  id: insulated
  name: Insulated
  description: through natural or artificial means you're naturally insulated against electricity
  category: Physical
  cost: 10
  speciesBlacklist:
  - IPC
  mutuallyExclusiveTraits:
  - fireproof
  - radproof
  - snakeeater
  - cryoresistant
  components:
  - type: Insulated

- type: trait
  id: heatresistant
  name: heatresistant
  description: through natural or artificial means you're naturally insulated against fire
  category: Physical
  cost: 10
  speciesBlacklist:
  - IPC
  mutuallyExclusiveTraits:
  - insulated
  - radproof
  - snakeeater
  - cryoresistant
  components:
  - type: FireproofBodyParts
  - type: DamageProtectionBuff
    modifiers:
      dermal:
        id: FireproofTrait
        coefficients:
          Heat: 0.01
  - type: FireProtection
    reduction: 0

