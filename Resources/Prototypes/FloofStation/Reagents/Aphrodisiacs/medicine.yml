        showInChat: true
        probability: 0.02
      - !type:MovespeedModifier
        walkSpeedModifier: 0.8
        sprintSpeedModifier: 0.8
        conditions:
        - !type:ConsentCondition
          consent: Aphrodisiacs
        - !type:ReagentThreshold
          min: 16.5
      - !type:GenericStatusEffect
        conditions:
        - !type:ConsentCondition
          consent: Aphrodisiacs
        - !type:ReagentThreshold
          min: 30.0
        key: ForcedSleep
        component: ForcedSleeping
        refresh: false
        type: Add
        probability: 0.1
