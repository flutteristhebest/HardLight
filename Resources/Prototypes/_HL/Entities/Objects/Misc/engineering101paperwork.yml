    content: |2
      [color=#f39f27]░░▄▀░░ [/color] [bold]Hardlight Sector: Engineering 101[/bold]       [bold]Form: [/bold][color=#f39f27]AP-2[/color]
      [color=#f39f27]░▄█▄▄▀ [/color] [color=#AAAAAA][italic]Brought to you by Colonial Command[/color][/italic]
      [color=#f39f27]██▀░░░ [/color] [color=#AAAAAA][italic]Written By: [bold]Colonial Engineer, CYN-182[/bold][/color][/italic]
      [color=#383838]▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄[/color]
      [color=#f39f27]▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀[/color]
      [head=1][color=#f39f27]Atmospheric[/color] Distro & Waste[/head]

      [color=#AAAAAA][italic]The following is intended to teach you how to both deliver air to the station, and keep said air clean for future use.[/color][/italic]
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Distribution[/head]
      Commonly referred to as such, or the "Distro-Loop."

      This line specifically is colored a dark blue, and connects to the air vents across the entire station.

      Oxygen and Nitrogen is carried within, at commonly a 21% Oxygen and 79% Nitrogen at 20C from the gas mixer at the start of the line within Atmospherics.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Waste[/head]
      Commonly referred to as such, or the "Waste-Loop."

      This line is specifically colored a dark red, and connects to the air scrubbers across the station.

      This pulls gasses from the air in the station that's bad for any living being and brings it into Atmospherics to be filtered out into storage tanks, or vented into space at the very end.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Waste-Loop Optimizations[/head]
      Most station waste-loops fail to account for a over-abundance of gasses causing a clog. So here's a simplistic way to prevent that!

      • Move the Gas Filter's one tile away from their gas outputs.
      • Put a Gas Manifold in the gap
      • Connect a Inlet Pressure Regulator set to 4400kPa
      • Connect the Inlet Pressure Regulator's to bypass the filters to vent directly into space.

      This setup specifically prevents the filters from clogging, allowing for a near non-existence requirement to oversee it.

      More-Over. It is recommended to disconnect the Oxygen and Nitrogen filters and avoid ever filtering for them. As the potential harm of adding super-heated gasses from a accidental burn to either gas storages heavily outweighs the benefit.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [color=#AAAAAA][italic][bold]Thank You, [/bold]for reading this document. As; 
      "Ignorance is only harmful if you do not seek to learn."[/color][/italic]

