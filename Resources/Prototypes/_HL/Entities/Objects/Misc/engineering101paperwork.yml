                                    [head=1][color=#f39f27]Tesla[/color] Engine[/head]

      [color=#AAAAAA][italic]The following is intended to teach you how to safely operate a Tesla Engine.[/color][/italic]
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Tesla Engine[/head]
      A Tesla Engine is a 3x3 space with 4 "Containment Field Generator's" at each corner, while being powered via "Emitters" firing a energy laser at them.

      In the center rests the Tesla Generator, which outputs electrical shocks and arcs once turned into a Tesla Ball by firing a "Particle Accelerator" or PA at it. The electrical shocks and arcs subsequently hit the Tesla Coils and and produce power.

      It is recommended to repair the Tesla Coils every 20 minutes to ensure they do not break.

      Due to the nature of electrical arcs and shocks targeting electrical sources. Grounding Rods are required around the edges of the containment field to prevent damage to the station. While wearing Insulated Gloves prevents the potential of them striking you.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Extra Info[/head]
      Tesla Coils require a welder to repair periodically, however this can be made automatic via working with Robotics to produce Welder Bots.

      The Emitter's require a MV Connection to function to charge the Containment fields. Be careful to not be hit by one of their energy beams, as they can cause painful burns.

      The Particle Accelerator should only be active up until the Tesla Ball is produced by its generator, otherwise it could potentially break containment.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Teslaloose Event[/head]
      A "Teslaloose" is whenever the Tesla Ball inside a Tesla Engine breaks out, or is released from its containment and begins to roam the station, striking electrical arcs at anything able to hold a electrical charge.

      The only way to stop a Teslaloose is to fire on it with "Portable Particle Decelerator's" or PPD's. Which carry enough internal charge for 20 shots. After which requires recharging inside a recharger. These can be produced in a Protolathe or Engineering Techfab.

      Do note, PPD's much like the PA can fire through objects. So use it to your advantage if the Teslaloose is known to be beyond the object your firing through. With a Teslaloose being much more hardy compared to a Singuloose, requiring much more time or effort to destabilize.

      Avoiding the Tesla Ball is the key, as much like a Singuloose. Touching it directly results in death. However wearing Insulated Gloves makes you all but immune to the effects of the electrical arcs that strike at you.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [color=#AAAAAA][italic][bold]Thank You, [/bold]for reading this document. As; 
      "Ignorance is only harmful if you do not seek to learn."[/color][/italic]

- type: entity
  id: PaperworkEngiAtmosParts101
  name: Engineering 101 - Atmospheric Parts
  description: Contains all the info one might need about each and every part that controls gasses.
  parent: Paper
  components:
  - type: Paper
    content: |2
      [color=#f39f27]░░▄▀░░ [/color] [bold]Hardlight Sector: Engineering 101[/bold]       [bold]Form: [/bold][color=#f39f27]AP-1[/color]
      [color=#f39f27]░▄█▄▄▀ [/color] [color=#AAAAAA][italic]Brought to you by Colonial Command[/color][/italic]
      [color=#f39f27]██▀░░░ [/color] [color=#AAAAAA][italic]Written By: [bold]Colonial Engineer, CYN-182[/bold][/color][/italic]
      [color=#383838]▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄[/color]
      [color=#f39f27]▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀[/color]
                          [head=1][color=#f39f27]Atmospheric[/color] Parts[/head]

      [color=#AAAAAA][italic]The following is intended to teach you how each atmospheric part functions and in what case should they be used.[/color][/italic]
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Air Alarms[/head]
      These Wall-Mounted machines are where things like Vents, Scrubbers, Signal Valves, Air Sensors, Etc. Can connect and feed information about a room.

      This is also the only way to control Vents and Scrubbers and their various settings. Though are most commonly used to alert station crew if a room is not within a livable range.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Firelocks[/head]
      Doors and Directional Doors that specifically close when their connected Air Alarms begin enter a danger state. Mostly as a deterrent or outright blockade to prevent the stations crew from accidently entering a area with a dangerous air mixture.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Gas Pipes[/head]
      Your bread and butter of moving around gasses. From strait pieces, to 4-Way pieces, they connect the gas flow between each different part below.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Pumps[/head]
      Gas Pumps and Volumetric Pumps move gasses. Both do things slightly differently.

      Gas Pumps move gasses based off pressure. Being better for pulling and pushing gasses into vacuums, or finely controlling the pressure of a network.

      Volumetric Pumps move gasses based off liters. Being better for bulk movement of gasses than fine control.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Input & Output[/head]
      Vents, Passive Vents, Injectors, Scrubbers, Etc. These are ways to take gasses out of pipes, and put them into the air for use or removal.

      Vents are the stations consistent way to take gasses from a network and output them to a desired pressure. Commonly used for Distribution of air across the station.

      Passive Vents don't require power to function compared to other forms of Input and Outputs. Where they specifically can output or input depending on its setup, as they function off which has higher pressure, be it the vent or the room.

      Air Injector's are the bread and butter of a one-way movement of gas into the atmosphere of a room. Quickly ejecting out any gas within itself without allowing a way back in. This though has a upper limit of 9000kPa.

      Air Scrubbers, are opposing side of Air Injector's. Allowing via a air alarm for the removal of a specific gas or gasses from a rooms air.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Valves[/head]
      Allows or Blocks the flow of gas as needed or inputted. Only three are worth mention.

      Signal Valves function based off signals from logic gates or air alarms.

      Passive Gates disallow gasses from the input to re-enter into the input. With the side of the input being on the red circle.

      Inlet Pressure Regulator's will automatically open when their inlet reaches their Setpoint, and will stop either when the inlet goes back below the setpoint or is equal with its outlets pressure.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Mixing & Filtering[/head]
      I'm reaching the character limit. This is self-explanatory.

      Mixing, mixes the Primary and Secondary inputs at a ratio. This ratio can be disrupted by a temperature difference in the gasses.

      Filtering has a output and pass-through. The output on the bottom has the gasses you select, and the pass-through is the opposing and has the gasses you didn't select.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Temperature Manipulation[/head]
      Freezer's Cool, Heater's Heat. Their efficiency is based off how much power they get up until their full-powered.

      Radiator's radiate the heat of the gas inside them, and takes in the heat from the gas, or lack there-of, around it.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Gas Condensing[/head]
      This machine takes any gasses in the network and turns them into their liquid chemical form. Use this for easy base chemistry liquids!
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• What do Inline's Do?[/head]
      Instead of functioning based off what gas is inside itself, it functions based off what gas is inside the entire network. Being incredibly useful overall depending on the situation.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• High-Pressure Casings[/head]
      A Tier 3 Engineering Research from Science. These allow for much higher pressure or flow atmospheric parts to be made. 

      A example is a High-Flow Gas Pump being able to push up to 13500kPa compared to the normal 4500kPa limit.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [color=#AAAAAA][italic][bold]Thank You, [/bold]for reading this document. As; 
      "Ignorance is only harmful if you do not seek to learn."[/color][/italic]

