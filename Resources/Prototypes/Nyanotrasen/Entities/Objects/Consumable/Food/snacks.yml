# Snacks and Entrees

- type: entity
  name: borito pie
  parent: FoodMealBase
  id: FoodBoritoPie
  description: For when you are bored of normal meals while sitting in brig.
  components:
  - type: FlavorProfile
    flavors:
    - meaty
    - cheesy
    - boritos
  - type: Sprite
    sprite: Nyanotrasen/Objects/Consumable/Food/Snacks/boritopie.rsi
    state: borito-pie
  - type: Edible
    trash:
    - FoodPacketBoritosTrash
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Nutriment
          Quantity: 13
        - ReagentId: CapsaicinOil
          Quantity: 1
        - ReagentId: Vitamin
          Quantity: 2
        - ReagentId: Protein
          Quantity: 4
  - type: Tag
    tags:
    - Meat

- type: entity
  name: engine fodder
  parent: FoodBakingBase
  id: FoodMothEngineFodder
  description: A common snack for moth engineers, made of seeds, nuts, chocolate, popcorn, and potato chips	designed to be dense with calories and easy to snack on when an extra boost is needed.
  components:
  - type: FlavorProfile
    flavors:
    - seeds
  - type: Sprite
    sprite: Nyanotrasen/Objects/Consumable/Food/Snacks/moth.rsi
    state: enginefodder
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 40 # Very compact food
        reagents:
        - ReagentId: Nutriment
          Quantity: 18
        - ReagentId: Sugar
          Quantity: 5
        - ReagentId: TableSalt
          Quantity: 2
        - ReagentId: Protein
          Quantity: 4
        - ReagentId: Vitamin
          Quantity: 6
  - type: Tag
    tags:
    - ClothMade # Mothic Food

- type: entity
  name: fueljack's lunch
  parent: FoodBakingBase
  id: FoodMothFueljackLunch
  description: A dish made from fried vegetables. Popular amongst the brave moths that faces the dangers of space.
  components:
  - type: FlavorProfile
    flavors:
    - seeds
  - type: Sprite
    sprite: Nyanotrasen/Objects/Consumable/Food/Snacks/moth.rsi
    state: fueljacklunch
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 15
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Vitamin
          Quantity: 10
  - type: Tag
    tags:
    - ClothMade # Mothic Food
