- type: entity
  name: aberrant spike sniper rifle
  parent: [BaseC3ExpeditionContraband, BaseGunWieldable, BaseItem]
  id: AberrantSpikeSniper
  description: Horrible parody on a real sniper rifle, complete with a wierd-looking scope. Constantly generates new poisoned darts untill full.
  components:
  - type: Item
    size: Large
    sprite: _HL/Objects/Weapons/Guns/Rifles/aberrantsniper.rsi 
  - type: Sprite
    sprite: _HL/Objects/Weapons/Guns/Rifles/aberrantsniper.rsi 
    layers:
      - state: icon
  - type: Clothing
    sprite: _HL/Objects/Weapons/Guns/Rifles/aberrantsniper.rsi 
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 10
    rechargeSound:
      path: /Audio/Effects/Fluids/blood2.ogg
  - type: BasicEntityAmmoProvider
    proto: HLDartAberrantBoneLong 
    capacity: 5
    count: 5
  - type: Gun
    minAngle: 3
    maxAngle: 6
    fireRate: 0.7
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Items/bow_pull.ogg
    soundEmpty: null
    projectileSpeed: 30
  - type: GunRequiresWield
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 3
    pvsIncrease: 1
  - type: SpeedModifiedOnWield
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: GunWieldBonus
    minAngle: -0
    maxAngle: -0
    