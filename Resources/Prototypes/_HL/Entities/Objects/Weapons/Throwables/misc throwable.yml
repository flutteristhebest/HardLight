  description: The sidearm of any- wait, the slide has been welded shut.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Pistols/N1984.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1.5
    damage:
      types:
        Blunt: 8
  - type: LandAtCursor
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 30
  - type: Item
    sprite: Objects/Weapons/Guns/Pistols/N1984.rsi
    size: Small
  - type: ThrowingAngle
    angle: 225

- type: entity
  parent: Dart
  id: DartBone
  name: bone dart
  description: A piece of bone, hollowed out from the inside allowing it to store chemicals.
  components:
  - type: Item
    sprite: _HL/Objects/Fun/bonedart.rsi
  - type: Sprite
    sprite: _HL/Objects/Fun/bonedart.rsi
  - type: SolutionContainerManager
    solutions:
      melee:
        maxVol: 5
  - type: SolutionInjectOnEmbed
    transferAmount: 5
    blockSlots: NONE
    solution: melee
  - type: SolutionTransfer
    maxTransferAmount: 5
  - type: Construction
    graph: BoneDart
    node: BoneDart
 
