- type: entity
  id: HLDartAberrantBone
  name: bone spike
  parent: [ ConjuredObject10, BaseArrow ]
  categories: [ HideSpawnMenu ]
  components:
  - type: EmbeddableProjectile
    offset: -0.15,0.0
  - type: Sprite
    sprite: _HL/Objects/Weapons/Guns/Ammunition/Projectiles/aberrantprojectiles.rsi
    layers:
    - state: spike
    - state: spikeSolution1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: SolutionContainerManager
    solutions:
      ammo:
        maxVol: 1
        reagents:
        - ReagentId: Mechanotoxin
          Quantity: 1
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    fillBaseName: spikeSolution
  - type: Projectile
    damage:
      types:
        Piercing: 10
        
