- type: entity
  id: BlueRainLizard
  parent: HL_LizardHead
  name: Blue Rain Lizard
  components:
  - type: NpcFactionMember
    factions:
    - Lizard
  - type: Sprite
    drawdepth: Mobs
    sprite: _HL/Lizard/lizard.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: lizardheadclosed
      scale: 0.6, 0.6
      color: "#3363ac"
      shader: unshaded
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 1000 #Density is not final, adjust accordingly if the number of tail segments is reduced or increased
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: SegmentedEntity
    numberOfSegments: 3
    staticOffset: 0.35
    staticScale: 0.6
    useTaperSystem: true
    taperOffset: 3
    texturePath: /Textures/_HL/Lizard/lizard.rsi/bluesegment.png
    shaderId: unshaded
