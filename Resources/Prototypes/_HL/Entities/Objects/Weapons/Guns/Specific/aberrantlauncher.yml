- type: entity
  name: aberrant spike rifle
  parent: [BaseC3ExpeditionContraband, BaseGunWieldable, BaseItem]
  id: AberrantSpikeGun
  description: Horrible parody of a real rifle, constantly generates new poisoned darts untill full.
  components:
  - type: Item
    size: Large
    sprite: _HL/Objects/Weapons/Guns/Rifles/aberrantguns.rsi 
  - type: Sprite
    sprite: _HL/Objects/Weapons/Guns/Rifles/aberrantguns.rsi 
    layers:
      - state: base
  - type: Clothing
    sprite: _HL/Objects/Weapons/Guns/Rifles/aberrantguns.rsi 
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 2
    rechargeSound:
      path: /Audio/Effects/Fluids/blood2.ogg
  - type: BasicEntityAmmoProvider
    proto: HLDartAberrantBone 
    capacity: 30
    count: 30
  - type: Gun
    minAngle: 5
    maxAngle: 10
    fireRate: 4
    selectedMode: FullAuto
    availableModes:
      - FullAuto
      - SemiAuto
    soundGunshot:
      path: /Audio/Items/bow_pull.ogg
    soundEmpty: null
    projectileSpeed: 30
  - type: GunRequiresWield
  - type: GunWieldBonus
    minAngle: -0
    maxAngle: -0
 
