# Just going to remake and comment out the old Forktail. This is so fucked.
- type: entity
  name: Forktail (25x59mm)
  parent: [BaseWeaponSniper, BaseGunWieldable, BaseC2ContrabandMercenary] # Hardlight
  id: WeaponSniperBigAMR
  description: A Hristov bubba'd to fire 25x59mm high-explosive rounds using iron sights... Why?
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Snipers/forktail.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Snipers/forktail.rsi
  - type: GunRequiresWield
  - type: Gun
    fireRate: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - Cartridge25x59HE
    capacity: 1
    proto: Cartridge25x59HE
  - type: SpeedModifiedOnWield
    walkModifier: 0.25
    sprintModifier: 0.25
