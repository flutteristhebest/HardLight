- type: entity
  id: BorgModuleAdvancedParamedic
  parent: [ BaseBorgModuleMedical, BaseProviderBorgModule ]
  name: chemical recovery cyborg module
  components:
  - type: Sprite
    layers:
    - state: medical
    - state: icon-paramedic
      sprite: _NF/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule # HardLight: Edited to use the new system.
    hands:
    - item: HandheldHealthAnalyzerUnpowered
    - item: BorgHypoTricordrazine
    - item: BorgHypoInaprovaline
  - type: BorgModuleIcon
    icon: { sprite: _NF/Interface/Actions/actions_borg.rsi, state: adv-paramed-module }

- type: entity
  id: BorgModuleJetpack
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: Frontier cyborg module
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-jetpack
      sprite: _NF/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule # HardLight: Edited to use the new system.
    hands:
    - item: HandheldGPSBasic
    - item: HandHeldMassScannerBorg
    - item: HandheldStationMapUnpowered # Hardlight
    - item: BorgClock
    - item: JetpackMiniFilled
      hand:
        emptyRepresentative: JetpackMini
        emptyLabel: borg-slot-jetpack-empty
        whitelist:
          components:
          - Jetpack
    - item: RadioHandheldNF # Hardlight
  - type: BorgModuleIcon
    icon: { sprite: _NF/Interface/Actions/actions_borg.rsi, state: jetpack-module }

- type: entity
  id: BorgModuleBureaucracy
  parent: [ BaseBorgModuleService, BaseProviderBorgModule ]
  name: bureaucracy cyborg module
  components:
  - type: Sprite
    layers:
    - state: service
    - state: icon-pen
  - type: ItemBorgModule # HardLight: Edited to use the new system.
    hands:
    - item: Pen
    - item: HandLabeler
    - item: BooksBag
      hand:
        emptyRepresentative: BooksBag
        emptyLabel: borg-slot-bag-empty
        whitelist:
          components:
          - NFBookBag
    - item: Pen
      hand:
        emptyRepresentative: Pen
        whitelist:
          tags:
          - Write
        blacklist:
          components:
          - EnergyWeapon
    - item: Paper
      hand:
        emptyRepresentative: Paper
        whitelist:
          components:
          - Paper
    - item: RubberStampApproved
      hand:
        emptyRepresentative: RubberStampBase
        whitelist:
          components:
          - Stamp
  - type: BorgModuleIcon
    icon: { sprite: _NF/Interface/Actions/actions_borg.rsi, state: bureaucracy-module }

- type: entity
  id: BorgModuleChef
  parent: [ BaseBorgModuleService, BaseProviderBorgModule ]
  name: chef cyborg module
  components:
  - type: Sprite
    layers:
    - state: service
    - state: icon-burger
      sprite: _NF/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule # HardLight: Edited to use the new system.
    hands:
    - item: RollingPin
    - item: KitchenKnife
    - item: LargeBeaker
      hand:
        emptyRepresentative: Beaker
        whitelist:
          tags:
          - GlassBeaker
          - DrinkGlass
          components:
          - Utensil
          - NFCookware
    - item: FoodPlateTin
      hand:
        emptyRepresentative: FoodPlateTin
        whitelist:
          tags:
          - GlassBeaker
          - DrinkGlass
          components:
          - Utensil
          - NFCookware
    - item: ReagentContainerFlour
      hand:
        emptyRepresentative: ReagentContainerFlour
        whitelist:
          tags:
          - Ingredient
          components:
          - Food
          - Produce
          - NFIngredient
    - item: FoodApple
      hand:
        emptyRepresentative: FoodApple
        whitelist:
          tags:
          - Ingredient
          components:
          - Food
          - Produce
          - NFIngredient
  - type: BorgModuleIcon
    icon: { sprite: _NF/Interface/Actions/actions_borg.rsi, state: chef-module }
