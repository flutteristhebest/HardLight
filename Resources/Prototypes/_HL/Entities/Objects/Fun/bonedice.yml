- type: entity
  parent: BaseDice
  id: d20DiceBone
  name: bone d20
  description: A die with twenty sides. Made out of a bone.
  components:
  - type: Dice
    sides: 20
    currentValue: 20
  - type: Sprite
    sprite: _HL/Objects/Fun/bonedice.rsi
    noRot: true # If their sprites rotate, the number becomes even more illegible than usual.
    state: d20_20
  - type: Construction
    graph: BoneD20
    node: BoneD20

