# Show your interest!
- type: Interaction
  id: CheckOut
  parent: BaseGlobal
  priority: -100 # Very specific ERP meaning, should be at the bottom
  requiresHands: false
  requiresUnblocked: false
  exemptFromInteractionBlocker: true
  contactInteraction: false
  icon: /Textures/Interface/Actions/eyeopen.png
  range: {max: 20}
  effectSuccess:
    popup: Subtle
    sound: {path: /Audio/Effects/ominous.ogg}
    soundPerceivedByOthers: false
  action:
    !type:NoOpAction
  hideByRequirement: false
  requirement:
    !type:MobStateRequirement # Don't check out a wall
    inverted: true
