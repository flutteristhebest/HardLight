- type: entity
  parent: BaseDice
  id: d4DiceBone
  name: bone d4
  description: A die with four sides. Made out of a bone.
  components:
  - type: Dice
    sides: 4
    currentValue: 4
  - type: Sprite
    sprite: _HL/Objects/Fun/bonedice.rsi
    noRot: true # If their sprites rotate, the number becomes even more illegible than usual.
    state: d4_4
  - type: CollisionWake
    enabled: false
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        layer:
        - LowImpassable
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        density: 30
        mask:
        - ItemMask
  - type: StepTrigger
    intersectRatio: 0.2
  - type: TriggerOnStepTrigger
  - type: PreventableStepTrigger
  - type: Slippery
    slipSound:
      path: /Audio/Effects/glass_step.ogg
    slipData:
      launchForwardsMultiplier: 0
  - type: DamageUserOnTrigger
    damage:
      types:
        Piercing: 8
  - type: Construction
    graph: BoneD4
    node: BoneD4
