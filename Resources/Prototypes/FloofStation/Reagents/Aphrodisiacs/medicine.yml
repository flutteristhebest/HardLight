  color: "#ae0072"
  metabolisms:
    Medicine:
      metabolismRate : 0.02
      effects:
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages:
          - "reagent-effect-aphrodisiac-normal1"
          - "reagent-effect-aphrodisiac-normal2"
          - "reagent-effect-aphrodisiac-normal3"
          - "reagent-effect-aphrodisiac-normal4"
          - "reagent-effect-aphrodisiac-normal5"
          - "reagent-effect-aphrodisiac-normal6"
          - "reagent-effect-aphrodisiac-normal7"
