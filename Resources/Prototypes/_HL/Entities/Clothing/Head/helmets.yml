- type: entity
  parent: ClothingHeadHelmetBase
  id: HLClothingHeadHelmetClockwork
  name: clockwork helmet
  description: A heavy helmet made of brass.
  components:
  - type: Sprite
    sprite: _HL/Clothing/Head/clockwork.rsi
  - type: IngestionBlocker
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.8
        Piercing: 0.9
        Heat: 0.9
  - type: HideLayerClothing
    slots:
    - HeadTop
    - HeadSide
    - Hair

- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHelmetHardsuitLuxmax
  categories: [ HideSpawnMenu ]
  name: luxury maxim hardsuit helmet
  description: This thing is made of solid gold, its a wonder you can keep your head up with it on.
  components:
  - type: Sprite
    sprite: _HL/Clothing/Head/Hardsuits/luxmax.rsi
  - type: Clothing
    sprite: _HL/Clothing/Head/Hardsuits/luxmax.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.525
    lowPressureMultiplier: 1000
  - type: PointLight
    radius: 7
    energy: 3
    
- type: entity
  parent: [ ClothingHeadBase, BaseC3ExpeditionContraband, ContrabandClothing ]
  id: ClothingHeadHelmetAberrant
  name: aberrant helmet
  description: Wearing this helmet feels like putting your head inside of someone's corpse. But hey, at least it can open up for eating.
  components:
  - type: Sprite
    sprite: _HL/Clothing/Head/aberranthelm.rsi
    layers:
    - state: icon
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-head
      head-vox:
      - state: equipped-head-vox
      head-reptilian:
      - state: equipped-head-reptilian
  - type: TemperatureProtection
    heatingCoefficient: 0.01 #Same as fire helmets or eva helmets. I just felt like it
    coolingCoefficient: 0.2
  - type: IdentityBlocker
  - type: BreathMask
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: MaterialSheetMeat1
      amount: 2
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 1.2 #Flesh that hates etc, burn that creature
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    - HeadTop
    - HeadSide