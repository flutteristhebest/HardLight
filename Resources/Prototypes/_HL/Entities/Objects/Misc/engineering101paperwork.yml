                                 [head=1][color=#f39f27]Build[/color] Anything[/head]

      [color=#AAAAAA][italic]The following is intended to teach you the basics of building.[/color][/italic]
      [color=#f39f27]──────────────────────────────────────────[/color]
      Your PDA has a list of all constructable machines, signs, pipes, etc. Loaded into its database. To access this, simply press G or B on its build-in keyboard, or press the hammer icon in the top-left of the screen.

      Don't be overwhelmed by the amount, as located in the top left of the UI is a search bar and category selector!

      The right side of the UI contains the description of the object you seek to build, alongside the materials and tools needed.

      For multi-step objects like constructing machines via machine frames. Simply hover your PDA over the machine board you wish to build, and it will provide the needed materials.

      [color=#AAAAAA][italic][ Just hover over the machine frame or board and right-click for a display on what parts you need! ][/color][/italic]

      Beyond that, place and build where you need! You will learn how to quickly do so in due time, so don't overly stress about being slow at first.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [color=#AAAAAA][italic][bold]Thank You, [/bold]for reading this document. As; 
      "Ignorance is only harmful if you do not seek to learn."[/color][/italic]

