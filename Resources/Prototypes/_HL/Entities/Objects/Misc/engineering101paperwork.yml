                                [head=1][color=#f39f27]Frezon[/color] Creation[/head]

      [color=#AAAAAA][italic]The following is intended to teach you how to make Frezon.[/color][/italic]
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Frezon Setup[/head]
      To create Frezon in a simple way, you need a handful of things.

      • A 3x3 Room
      • A Oxygen Injector
      • A Nitrogen Injector
      • A Tritium Injector
      • A Freezer
      • A Air Alarm
      • Scrubbers

      The Oxygen and Tritium is the main components of the reaction, where as the Nitrogen and Temperature is the catalysts.

      The ratio be damned in the guide-book. As the chamber will contain the Oxygen and Nitrogen needed via the injector's, where the freezer connected to the room via a passive vent will cool any gas inside to the required temperatures. 

      Then the Tritium will be injected where it'd react with the already present Oxygen and Nitrogen to create Frezon. The scrubbers then scrub for only Frezon to quickly remove it from the room before it reacts with the Nitrogen inside to break down into Nitrous Oxide.

      And this is how you make Frezon in a very simple way without the requirement to worry about a ratio or getting it perfect!
      [color=#f39f27]──────────────────────────────────────────[/color]
      [color=#AAAAAA][italic][bold]Thank You, [/bold]for reading this document. As; 
      "Ignorance is only harmful if you do not seek to learn."[/color][/italic]

