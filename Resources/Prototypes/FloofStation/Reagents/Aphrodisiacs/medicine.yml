- type: reagent
  id: Pomelustine
  name: reagent-name-pomelustine
  group: Medicine
  desc: reagent-desc-pomelustine
  physicalDesc: reagent-physical-desc-sticky
  flavor: fruity
  color: "#45072f"
  metabolisms:
    Medicine:
      metabolismRate : 0.03
      effects:
      - !type:PopupMessage
        type: Local
        visualType: Medium
        messages:
          - "reagent-effect-aphrodisiac-mild1"
          - "reagent-effect-aphrodisiac-mild2"
          - "reagent-effect-aphrodisiac-mild3"
          - "reagent-effect-aphrodisiac-mild4"
          - "reagent-effect-aphrodisiac-mild5"
          - "reagent-effect-aphrodisiac-mild6"
          - "reagent-effect-aphrodisiac-mild7"
          - "reagent-effect-aphrodisiac-mild8"
          - "reagent-effect-aphrodisiac-mild9"
          - "reagent-effect-aphrodisiac-mild10"
          - "reagent-effect-aphrodisiac-mild11"
          - "reagent-effect-aphrodisiac-mild12"
          - "reagent-effect-aphrodisiac-mild13"
          - "reagent-effect-aphrodisiac-mild14"
          - "reagent-effect-aphrodisiac-mild15"
        probability: 0.035
        conditions:
          - !type:ConsentCondition
            consent: Aphrodisiacs
          - !type:ReagentThreshold
            max: 50
      - !type:PopupMessage # Overdose causes nausea and vomiting
        type: Local
        visualType: Medium
        messages:
          - "reagent-effect-aphrodisiac-mildoverdose1"
          - "reagent-effect-aphrodisiac-mildoverdose2"
          - "reagent-effect-aphrodisiac-mildoverdose3"
          - "reagent-effect-aphrodisiac-mildoverdose4"
          - "reagent-effect-aphrodisiac-mildoverdose5"
        probability: 0.06
        conditions:
          - !type:ConsentCondition
            consent: Aphrodisiacs
          - !type:ReagentThreshold
            min: 50
      - !type:Drunk
        conditions:
        - !type:ConsentCondition
          consent: Aphrodisiacs
        - !type:ReagentThreshold
          min: 50
      - !type:ChemVomit
        conditions:
        - !type:ReagentThreshold
          min: 60
        probability: 0.05
      - !type:PopupMessage
        type: Local
        visualType: Small
        messages:
          - "reagent-effect-aphrodisiac-fade" # A decent chance to notify the player when their meds run out, but could happen silently.
        probability: 0.35
        conditions:
          - !type:ConsentCondition
            consent: Aphrodisiacs
          - !type:ReagentThreshold
            max: 0.1

- type: reagent
  id: Philterex
  name: reagent-name-philterex
  group: Medicine
