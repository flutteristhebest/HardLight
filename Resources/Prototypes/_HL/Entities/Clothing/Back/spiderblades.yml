- type: entity
  parent: Clothing
  id: ArachneSpiderBlades
  name: Arachne's Spider Blades
  suffix: Arachne
  description: A set of retractable spider-leg-like blades that extend from a mechanism on the user's back. They look deadly sharp.
  components:
  - type: Sprite
    sprite: _HL/Clothing/Back/spiderblades.rsi
    state: icon
  - type: Clothing
    sprite: _HL/Clothing/Back/spiderblades.rsi
    quickEquip: true
    slots:
    - back
  - type: Reflect
    reflectProb: 0.6
    reflects:
    - Energy
    - NonEnergy
    spread: 15
    soundOnReflect:
      path: /Audio/Weapons/block_metal1.ogg
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.7
  - type: MeleeWeapon
    autoAttack: true
    mustBeEquippedToUse: true
    wideAnimationRotation: 90
    attackRate: 3.0
    animation: WeaponArcClaw
    usableWhileEquipped: true
    damage:
      types:
        Slash: 20
        Piercing: 5
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
      
- type: entity
  parent: [Clothing, BaseC3ExpeditionContraband]
  id: AberrantTail
  name: aberrant biting tentacle
  description: A long flesh tentacle with a mouth ending with a mouth. Easily connects to your spine...if you dare to do it.
  components:
  - type: Sprite
    sprite: _HL/Clothing/Back/aberrantback.rsi
    state: icon
  - type: Clothing
    sprite: _HL/Clothing/Back/aberrantback.rsi          
    quickEquip: true
    slots:
    - back
    - suitStorage
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: MaterialSheetMeat1
      amount: 3
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 1.1
  - type: MeleeWeapon
    autoAttack: true
    mustBeEquippedToUse: true
    wideAnimationRotation: 90
    attackRate: 2.0
    animation: WeaponArcBite
    usableWhileEquipped: true
    damage:
      types:
        Slash: 6
        Piercing: 10
    soundHit:
      path: /Audio/Effects/bite.ogg
