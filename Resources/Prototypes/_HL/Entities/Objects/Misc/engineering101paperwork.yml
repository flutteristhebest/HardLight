      [head=3]• Small Nuclear Reactor[/head]
      [head=1][color=#34ad8d]▄[/color]  [color=#6134ad]▄[/color]  [color=#34ad8d]▄[/color]  [color=#6134ad]▄[/color]  [color=#34ad8d]▄[/color]
      [color=#6134ad]▄[/color]  [color=#f54242]▄[/color]  [color=#4287f5]▄[/color]  [color=#f54242]▄[/color]  [color=#6134ad]▄[/color]
      [color=#34ad8d]▄[/color]  [color=#4287f5]▄[/color]  [color=#4287f5]▄[/color]  [color=#4287f5]▄[/color]  [color=#34ad8d]▄[/color]
      [color=#6134ad]▄[/color]  [color=#f54242]▄[/color]  [color=#4287f5]▄[/color]  [color=#f54242]▄[/color]  [color=#6134ad]▄[/color]
      [color=#34ad8d]▄[/color]  [color=#6134ad]▄[/color]  [color=#34ad8d]▄[/color]  [color=#6134ad]▄[/color]  [color=#34ad8d]▄[/color][/head]

      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Temperature[/head]
      The overall temperature of the reactor and it's many parts. This controls specifically the temperature of the gas it outputs however keep in mind the following;

      The parts inside a nuclear reactor become melted at 1426C, at which they can no longer be removed. However any hotter than 80C requires gloves, and 400C receiving burns from handling is inevitable.

      The Nuclear Reactor itself has a meltdown threshold of 1726C.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Radiation[/head]
      Fuel Rods generate radiation, with this radiation leaking to the surrounding area around it in turn. Certain materials are more radioactive than others. A example would be Bananium Fuel Rods.

      The maximum before overload is 20 Rads/s
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Thermal Power[/head]
      The overall output of power from the reactor in terms of a ratio between the amount of gas being outputted, the heat of it, and the radiation output of the fuel rods.

      The maximum before overload is 10MtW.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Material Reactions[/head]
      Certain Materials have specific reactions. However those listed below are some of the best for their respective types.

      [head=3]• Control Rods[/head]
      Gold, or Plasteel

      [head=3]• Gas Channels[/head]
      Gold, Steel, or Glass

      [head=3]• Heat Exchangers[/head]
      Gold

      [head=3]• Fuel Rods[/head]
      Plutonium, Bananium, Uranium, or Plasma
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Gas Reactions[/head]
      There is also gas reactions. Below are their list. Note the fact the Nuclear Reactor is capable of breaking down certain gasses into other gasses and allowing gasses to burn inside itself. So use some of them with heavy caution.

      [head=3]• Nitrogen[/head]
      Much like the Supermatter, this gas is a go-to stable gas for the reactor. Nothing happens with it.

      [head=3]• Carbon Dioxide[/head]
      Lowers the reactivity inside the reactor, however with high enough temperatures it breaks down into Oxygen.

      [head=3]• Nitrous Oxide[/head]
      Does nothing much like Nitrogen, however with high enough temperatures it breaks down into Nitrogen.

      [head=3]• Plasma[/head]
      Increases the reactivity inside the reactor, while breaking down into randomized gasses. Plasma Fuel Rods break down into this as well as they decay. So use with some caution.

      [head=3]• Tritium[/head]
      GREATLY Increases the reactivity inside the reactor, being 3x stronger than Plasma while also breaking down into randomized gasses. Use in HEAVY moderation.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [color=#AAAAAA][italic][bold]Thank You, [/bold]for reading this document. As; 
      "Ignorance is only harmful if you do not seek to learn."[/color][/italic]

- type: entity
  id: PaperworkEngiAtmosTurb101
  name: Engineering 101 - Gas Turbine
  description: Contains all the info one might need about controlling a Gas Turbine.
  parent: Paper
  components:
  - type: Paper
    content: |2
      [color=#f39f27]░░▄▀░░ [/color] [bold]Hardlight Sector: Engineering 101[/bold]       [bold]Form: [/bold][color=#f39f27]NE-2[/color]
      [color=#f39f27]░▄█▄▄▀ [/color] [color=#AAAAAA][italic]Brought to you by Colonial Command[/color][/italic]
      [color=#f39f27]██▀░░░ [/color] [color=#AAAAAA][italic]Written By: [bold]Colonial Engineer, CYN-182[/bold][/color][/italic]
      [color=#383838]▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄[/color]
      [color=#f39f27]▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀[/color]
                                        [head=1][color=#f39f27]Gas[/color] Turbine[/head]

      [color=#AAAAAA][italic]The following is intended to teach you how to use the Gas Turbine.[/color][/italic]
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Gas Turbine[/head]
      Produces Electricity commonly from the Nuclear Reactor. However with more complex methods can be used off other means.

      There are many parts to keep in mind, which are listed below.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Flow Rate[/head]
      [color=#AAAAAA][italic]Note the fact it is locked at 200 for now until we iron out the bug in the software from the update we conducted to them.[/color][/italic]

      The amount of gas flowing into the turbine. The higher it is, the more gas the turbine both inputs and outputs through itself for power.

      The way this is formulated however is the following;
      100 + (100*Gas Exchanger Amount) = X
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Stator Load[/head]
      The primary way to control the Gas Turbine. As the higher the Stator Load is, the more gas/heat it needs for the turbine to keep its current RPM.

      The Stator Load also controls the amount of power the Turbine Produces per revolution. So the higher the Stator Load can be while remaining at peak RPM, the more power that's produced.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• RPM[/head]
      Located on the left side of the UI is 12 Dashes of varying color's. The main one that is to be focused on is the green one, which is the 3rd dash down from the top.

      That is the dash that is considered "Peak RPM."

      The Red Dash located at the very top is considered the "Overspeed RPM" where the Gas Turbine begins to take damage.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Turbine States[/head]
      Overspeed is a state where the turbine's Stator Load is too low, and the RPM is too high. Causing the Turbine to shake itself apart.

      Stalling is a state where the Stator Load is too high, resulting in it coming to a stop as it no longer produces any power.

      Overtemp is a state where the gasses going inside the turbine are too hot. Resulting in it starting to melt and eventually break open.

      Undertemp is a state where the gasses going inside are too cold. Resulting in it being unable to push the turbine and making no power.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Turbine Parts[/head]
      Each part has its own reactions within the Gas Turbine, however Gold Parts are the most efficient for power generation. 

      It is to note you can still experiment, as there are no "Bad" part. Just only inefficient for the setup. 
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Gas Turbine Repair[/head]
      To Repair a Gas Turbine, you only need a welder. However be warry of the gasses as the Turbine will continuously leak any gas that goes through it until it is repaired.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Self-Throttling[/head]

      [color=#AAAAAA][italic]Note the fact this is non-functional currently, and should not be used under any circumstances.

      This will be re-included in the future once it can be confirmed it works reliably once again.[/color][/italic]

      [color=#f39f27]──────────────────────────────────────────[/color]
      [color=#AAAAAA][italic][bold]Thank You, [/bold]for reading this document. As; 
      "Ignorance is only harmful if you do not seek to learn."[/color][/italic]