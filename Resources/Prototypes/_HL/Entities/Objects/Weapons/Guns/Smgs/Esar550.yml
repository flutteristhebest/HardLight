- type: entity
  name: ESAR-550
  parent: [BaseC3ContrabandUnredeemable, BaseWeaponPowerCell]
  id: WeaponSubMachineGunEsar550
  description: The Energy Security Auto Rifle, originally designed to replace the aging WT-550s, was made available to friendly sectors after several budget cuts to production lines.
  components:
  - type: Item
    size: Large
    sprite: _HL/Objects/Weapons/Guns/Smgs/esar550.rsi
  - type: Sprite
    sprite: _HL/Objects/Weapons/Guns/Smgs/esar550.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: base-unshaded
        map: ["enum.GunVisualLayers.BaseUnshaded"]
        shader: unshaded
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
      - state: mag-unshaded-0
        map: ["enum.GunVisualLayers.MagUnshaded"]
        shader: unshaded
  - type: Clothing
    sprite: _HL/Objects/Weapons/Guns/Smgs/esar550.rsi 
    slots:
    - Back
    - suitStorage
  - type: ProjectileBatteryAmmoProvider
    proto: HLBulletEsar550Low
    fireCost: 100
  - type: BatteryWeaponFireModes
    fireModes:
     - proto: HLBulletEsar550Low
       fireCost: 100
     - proto: HLBulletEsar550Medium
       fireCost: 138.8
     - proto: HLBulletEsar550High
       fireCost: 166.6
  - type: Gun
    fireRate: 5.5
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    - SemiAuto
    soundGunshot:
      path: /Audio/_DV/Weapons/Guns/Gunshots/laser.ogg
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: MagazineEsar550
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        whitelist:
          tags:
            - MagazineEsar550Tag
  - type: GunRequiresWield
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true

- type: entity
  name: ESAR-550 Case
  parent: WeaponCaseLong
  id: WeaponCaseLongESAR550
  description: A case containing the Head of Security's ESAR-550 and 3 additional magazines.
  suffix: DO NOT MAP
  components:
  - type: StorageFill
    contents:
    - id: WeaponSubMachineGunEsar550
      amount: 1
    - id: MagazineEsar550
      amount: 3