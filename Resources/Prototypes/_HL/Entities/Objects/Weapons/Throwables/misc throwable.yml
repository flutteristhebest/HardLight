- type: entity
  name: throwing brick
  parent: BaseItem
  id: ThrowingBrick
  description: Throwing it at someone would definitely hurt.
  components:
  - type: Sprite
    sprite: Objects/Materials/ingots.rsi
    state: copper
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1.5
    damage:
      types:
        Blunt: 8
  - type: LandAtCursor
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 25
  - type: Item
    sprite: Objects/Weapons/Melee/throwing_knife.rsi
    size: Small
  - type: ThrowingAngle
    angle: 225

- type: entity
  name: throwing N1984
  parent: BaseItem
