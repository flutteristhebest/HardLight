          - "reagent-effect-aphrodisiac-normaloverdose3"
          - "reagent-effect-aphrodisiac-normaloverdose4"
          - "reagent-effect-aphrodisiac-normaloverdose5"
          - "reagent-effect-aphrodisiac-normaloverdose6"
          - "reagent-effect-aphrodisiac-normaloverdose7"
          - "reagent-effect-aphrodisiac-normaloverdose8"
          - "reagent-effect-aphrodisiac-normaloverdose9"
          - "reagent-effect-aphrodisiac-normaloverdose10"
        probability: 0.06
