## Component example
- type: spawnCharacterOverrideRule
  id: LivyathanComponentOnSpawn
  match: Livyathan
  checkProfileName: true
  checkEntityName: true
  logins:
  - Livyathan
  components:
  - type: HLLivyathan

## Entity example
- type: spawnCharacterOverrideRule
  id: MobDragonLivyathanOnSpawn
