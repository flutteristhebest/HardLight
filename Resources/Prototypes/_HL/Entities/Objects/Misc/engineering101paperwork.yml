                              [head=1][color=#f39f27]Nuclear[/color] Reactor[/head]

      [color=#AAAAAA][italic]The following is intended to teach you how to tame a Nuclear Reactor.[/color][/italic]
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Nuclear Reactor[/head]
      Uses Radiation to generate heat, which is then put into a Gas Turbine to generate electricity.

      There is multiple things that have to be kept track of, of which are labeled below. With each one having audible noise once they begin to reach dangerous levels. Alongside a diagram for a efficient design.
      [color=#f39f27]──────────────────────────────────────────[/color]
      [head=2]• Setup Diagram[/head]

      • [color=#4287f5]Control Rods[/color]
      • [color=#34ad8d]Gas Channels[/color]
      • [color=#6134ad]Heat Exchangers[/color]
      • [color=#f54242]Fuel Rods[/color]

      [head=3]• Nuclear Reactor[/head]
      [head=1][color=#34ad8d]▄[/color]  [color=#6134ad]▄[/color]  [color=#34ad8d]▄[/color]  [color=#6134ad]▄[/color]  [color=#34ad8d]▄[/color]  [color=#6134ad]▄[/color]  [color=#34ad8d]▄[/color]
